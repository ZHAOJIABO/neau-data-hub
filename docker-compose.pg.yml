services:
  # 前端服务
  # 关键：context 显式用绝对路径/反斜杠风格，避免 docker compose 在 Windows 容器模式下
  #       解析相对路径出错，导致 build context 实际指向错目录（55kB 异常小，
  #       找不到 package.json 报 "/package.json": not found）。
  ruoyi-frontend:
    build:
      context: ./ruoyi-fastapi-frontend
      dockerfile: Dockerfile
    image: ruoyi-frontend:latest
    container_name: ruoyi-frontend
    ports:
      - "12580:80"
    volumes:
      - ./ruoyi-fastapi-frontend/bin/nginx.dockerpg.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - ruoyi-backend-pg
    networks:
      - ruoyi-network

  # 后端服务（PostgreSQL版本）
  ruoyi-backend-pg:
    platform: linux/amd64
    build:
      context: .
      dockerfile: ruoyi-fastapi-backend/Dockerfile.pg
    image: ruoyi-backend-pg:latest
    container_name: ruoyi-backend-pg
    ports:
      - "19099:9099"
    volumes:
      # 子目录级 bind-mount，避免覆盖镜像里固化的 /app/models/canal/canalsim：
      #   - models/irrigation/ → /app/models/irrigation/  （灌溉 LSTM/PPO/scaler 等）
      #   - canal/ 整个留给镜像固化（Dockerfile.pg 编译生成 canalsim）
      - ./ruoyi-fastapi-backend/models/irrigation:/app/models/irrigation
      - ./scripts:/app/datahub_scripts:ro
      # NEAU_DATA_DIR 默认值改成相对路径 ./data，确保 Windows / Linux / macOS 都能解析
      - ${NEAU_DATA_DIR:-./data}:/app/data:ro
      - ./data_assets:/app/data_assets
    depends_on:
      ruoyi-pg:
        condition: service_healthy
      ruoyi-redis:
        condition: service_healthy
    networks:
      - ruoyi-network

  # PostgreSQL服务
  ruoyi-pg:
    image: postgres:14
    container_name: ruoyi-pg
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ruoyi-fastapi
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15432:5432"
    volumes:
      - ./ruoyi-fastapi-backend/sql/ruoyi-fastapi-pg.sql:/docker-entrypoint-initdb.d/01-ruoyi-fastapi-pg.sql
      - ./scripts/datahub_database.sql:/docker-entrypoint-initdb.d/02-datahub_database.sql
      - ./scripts/menu_insert.sql:/docker-entrypoint-initdb.d/03-menu_insert.sql
      - ./pgdata:/var/lib/postgresql/data
    networks:
      - ruoyi-network
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务
  ruoyi-redis:
    image: redis:latest
    container_name: ruoyi-redis
    ports:
      - "16379:6379"
    volumes:
      - ./redisdata:/data
    networks:
      - ruoyi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

# 网络配置
networks:
  ruoyi-network:
    name: ruoyi-network
    driver: bridge
